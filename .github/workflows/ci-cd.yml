name: CI/CD Pipeline Innov'Events

# Pipeline CI/CD du projet Innov'Events.
# Les étapes de validation se lancent sur main et develop.
# Le déploiement automatique réel se lance uniquement lors d'un push sur main.
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ===================================
  # JOB 1 : Tests et build Frontend Angular
  # ===================================
  test-frontend:
    name: 🧪 Tests et build Frontend Angular
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 📦 Installation Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📚 Installation des dépendances frontend
        run: npm ci

      - name: 🔍 Vérification lint frontend
        run: npm run lint --if-present
        continue-on-error: true

      - name: 🧪 Tests unitaires frontend
        run: npm run test -- --watch=false --browsers=ChromeHeadless --code-coverage
        continue-on-error: true

      - name: 🏗️ Build frontend de production
        run: npm run build -- --configuration=production

      - name: 📊 Publication du rapport de couverture frontend
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-frontend
          path: frontend/coverage/
          retention-days: 30

      - name: 📦 Publication du build frontend
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 7

  # ===================================
  # JOB 2 : Tests et build Mobile Ionic
  # ===================================
  test-mobile:
    name: 🧪 Tests et build Mobile Ionic
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./mobile

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 📦 Installation Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: 📚 Installation des dépendances mobile
        run: npm ci

      - name: 🧪 Tests unitaires et fonctionnels mobile
        run: npm test

      - name: 🏗️ Build mobile de production
        run: npm run build

      - name: 📊 Publication du rapport de couverture mobile
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-mobile
          path: mobile/coverage/
          retention-days: 30

      - name: 📦 Publication du build mobile
        uses: actions/upload-artifact@v4
        with:
          name: mobile-build
          path: mobile/dist/
          retention-days: 7

  # ===================================
  # JOB 3 : Vérifications Backend PHP
  # ===================================
  test-backend:
    name: 🧪 Vérifications Backend PHP
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: innovevents_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🐘 Installation PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_mysql, mbstring, json
          coverage: xdebug

      - name: 📋 Vérification de la syntaxe PHP
        run: |
          find . -name "*.php" -print0 | xargs -0 -n1 php -l
        continue-on-error: true

      - name: 📚 Installation Composer si présent
        run: |
          if [ -f composer.json ]; then
            composer install --no-progress --prefer-dist --no-interaction
          else
            echo "Aucun composer.json trouvé : installation Composer ignorée."
          fi

      - name: 🧪 Tests PHPUnit si présents
        run: |
          if [ -f vendor/bin/phpunit ]; then
            vendor/bin/phpunit --coverage-text
          else
            echo "PHPUnit non installé : tests backend automatisés ignorés."
          fi
        continue-on-error: true

  # ===================================
  # JOB 4 : Analyse de sécurité
  # ===================================
  security-check:
    name: 🔒 Analyse de sécurité
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 📦 Installation Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🔍 Audit des dépendances frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm audit --audit-level=high
        continue-on-error: true

      - name: 🔍 Audit des dépendances mobile
        working-directory: ./mobile
        run: |
          npm ci
          npm audit --audit-level=high
        continue-on-error: true

  # ===================================
  # JOB 5 : Déploiement automatique Production
  # ===================================
  deploy:
    name: 🚀 Déploiement automatique Production
    runs-on: ubuntu-latest
    needs: [test-frontend, test-mobile, test-backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    env:
      PROD_HOST: ${{ secrets.PROD_HOST }}
      PROD_USER: ${{ secrets.PROD_USER }}
      PROD_PORT: ${{ secrets.PROD_PORT }}
      PROD_PATH: ${{ secrets.PROD_PATH }}
      FRONTEND_DIR: /var/www/innovevents-front/browser
      MOBILE_DIR: /var/www/innovevents-mobile/browser

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 📦 Installation Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🏗️ Build frontend production avant déploiement
        working-directory: ./frontend
        run: |
          npm ci
          npm run build -- --configuration=production

      - name: 🏗️ Build mobile production avant déploiement
        working-directory: ./mobile
        run: |
          npm ci
          npm run build

      - name: 🔐 Configuration SSH pour le VPS
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${PROD_PORT:-22}" "$PROD_HOST" >> ~/.ssh/known_hosts

      - name: 📁 Préparation des dossiers sur le VPS
        run: |
          ssh -p "${PROD_PORT:-22}" "$PROD_USER@$PROD_HOST" "
            mkdir -p $FRONTEND_DIR &&
            mkdir -p $MOBILE_DIR &&
            mkdir -p $PROD_PATH/backend &&
            mkdir -p $PROD_PATH/backend/uploads/events &&
            mkdir -p $PROD_PATH/backend/uploads/prospects
          "

      - name: 🚀 Synchronisation du frontend vers le VPS
        run: |
          FRONT_DIST=$(find frontend/dist -type f -name index.html -printf '%h\n' | head -n 1)

          if [ -z "$FRONT_DIST" ]; then
            echo "Aucun build frontend trouvé."
            exit 1
          fi

          echo "Déploiement du frontend depuis : $FRONT_DIST"

          rsync -az --delete -e "ssh -p ${PROD_PORT:-22}" \
            "$FRONT_DIST/" \
            "$PROD_USER@$PROD_HOST:$FRONTEND_DIR/"

      - name: 🚀 Synchronisation de l'application mobile vers le VPS
        run: |
          MOBILE_DIST=$(find mobile/dist -type f -name index.html -printf '%h\n' | head -n 1)

          if [ -z "$MOBILE_DIST" ]; then
            echo "Aucun build mobile trouvé."
            exit 1
          fi

          echo "Déploiement mobile depuis : $MOBILE_DIST"

          rsync -az --delete -e "ssh -p ${PROD_PORT:-22}" \
            "$MOBILE_DIST/" \
            "$PROD_USER@$PROD_HOST:$MOBILE_DIR/"

      - name: 🚀 Synchronisation du backend vers le VPS
        run: |
          rsync -az --delete -e "ssh -p ${PROD_PORT:-22}" \
            --exclude "uploads/" \
            --exclude ".env" \
            --exclude "vendor/" \
            backend/ \
            "$PROD_USER@$PROD_HOST:$PROD_PATH/backend/"

      - name: 🚀 Synchronisation Docker Compose vers le VPS
        run: |
          rsync -az -e "ssh -p ${PROD_PORT:-22}" \
            docker-compose.yml \
            "$PROD_USER@$PROD_HOST:$PROD_PATH/docker-compose.yml"

      - name: 🐳 Redémarrage des services Docker sur le VPS
        run: |
          ssh -p "${PROD_PORT:-22}" "$PROD_USER@$PROD_HOST" "
            cd $PROD_PATH &&
            docker compose up -d --build backend db mongo &&
            docker compose ps
          "

      - name: 🔁 Vérification et rechargement Nginx
        run: |
          ssh -p "${PROD_PORT:-22}" "$PROD_USER@$PROD_HOST" "
            nginx -t &&
            systemctl reload nginx
          "

      - name: ✅ Vérification HTTP du déploiement
        run: |
          curl -I "http://$PROD_HOST"

      - name: 📢 Confirmation du déploiement
        run: |
          echo "Déploiement automatique terminé avec succès."
          echo "Commit déployé : ${{ github.sha }}"
          echo "Auteur : ${{ github.actor }}"